<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS AI 실습 (학습자용)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; width: 100%; max-width: 450px; }
        .chat-box { background: #0f172a; border: 1px solid #334155; border-radius: 12px; height: 250px; overflow-y: auto; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; }
        .msg.student { background: #2563eb; align-self: flex-end; }
        .msg.patient { background: #334155; align-self: flex-start; }
        .gcs-zone { display: flex; gap: 5px; margin-bottom: 10px; }
        select { background: #0f172a; color: white; padding: 8px; border-radius: 5px; border: 1px solid #475569; flex: 1; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2563eb; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div id="loginSection">
        <h2>📱 실습 입장</h2>
        <input type="text" id="studentId" placeholder="학번" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="text" id="studentName" placeholder="성명" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn" onclick="enterRoom()">입장하기</button>
    </div>

    <div id="quizSection" style="display: none;">
        <div id="pName" style="font-weight:bold; color:#38bdf8; margin-bottom:10px;">환자 로딩 중...</div>
        <div class="chat-box" id="chatBox"></div>
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="studentMsg" style="flex:1; padding:10px; border-radius:8px;" placeholder="질문/자극 입력">
            <button onclick="sendToPatient()" style="background:#10b981; border:none; color:white; padding:10px; border-radius:8px;">전송</button>
        </div>
        <div class="gcs-zone">
            <select id="resE"><option value="4">E4</option><option value="3">E3</option><option value="2">E2</option><option value="1">E1</option></select>
            <select id="resV"><option value="5">V5</option><option value="4">V4</option><option value="3">V3</option><option value="2">V2</option><option value="1">V1</option></select>
            <select id="resM"><option value="6">M6</option><option value="5">M5</option><option value="4">M4</option><option value="3">M3</option><option value="2">M2</option><option value="1">M1</option></select>
        </div>
        <button class="btn" style="background:#10b981;" onclick="submitFinalAnswer()">최종 판정 제출</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://gcs-test-eb738-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let activeCaseIdx = -1;
    const aiResponses = {
        0: { name: "Case 01: 김지주 환자", init: "🚨 [환자 상태] 두통 호소 중.", call: "음... 어... 왜들 그래요...", where: "여기가 어디죠?", pain: "💥 손으로 밀쳐냅니다.", command: "🖐️ 손을 움찔거리기만 합니다.", default: "머리가 아파요..." },
        2: { name: "Case 03: 이경색 환자", init: "🚨 [환자 상태] 눈을 뜨고 주시 중.", call: "이미 눈을 뜨고 있습니다.", where: "어... 집... 가야 돼...", pain: "💥 왼손으로 밀쳐냅니다.", command: "🖐️ 왼손을 힘차게 꽉 쥡니다.", default: "...말이 안 나와..." }
    };

    function enterRoom() {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("quizSection").style.display = "block";
        db.ref('quizState').on('value', (snap) => {
            const state = snap.val();
            if(state && state.currentCase !== activeCaseIdx) {
                activeCaseIdx = state.currentCase;
                loadCase(activeCaseIdx);
            }
        });
    }

    function loadCase(idx) {
        const data = aiResponses[idx];
        document.getElementById("pName").innerText = data.name;
        document.getElementById("chatBox").innerHTML = `<div class="msg patient">${data.init}</div>`;
    }

    function sendToPatient() {
        const text = document.getElementById("studentMsg").value;
        const box = document.getElementById("chatBox");
        box.innerHTML += `<div class="msg student">${text}</div>`;
        
        const data = aiResponses[activeCaseIdx];
        let reply = data.default;
        
        // 우선순위 로직 (운동 관련 질문 시 command 출력)
        if (/팔|손|움직|쥐어|펴|다리|명령/.test(text)) reply = data.command;
        else if (/아픈|통증|자극|꼬집|누르/.test(text)) reply = data.pain;
        else if (/어디|병원|날짜|이름|누구/.test(text)) reply = data.where;
        else if (/눈|불러|깨워|들리|여보세요/.test(text)) reply = data.call;

        setTimeout(() => box.innerHTML += `<div class="msg patient">${reply}</div>`, 400);
        document.getElementById("studentMsg").value = "";
    }

    function submitFinalAnswer() { alert("제출 완료!"); }
</script>
</body>
</html>
