<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GCS AI 실습</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        .chat-box { height: 300px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; }
        .student { background: #2563eb; align-self: flex-end; }
        .patient { background: #334155; align-self: flex-start; }
    </style>
</head>
<body>

<div class="card">
    <div id="quizSection">
        <div id="pName" style="color:#38bdf8; font-weight:bold;">환자 로딩 중...</div>
        <div class="chat-box" id="chatBox"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="studentMsg" style="flex:1;" placeholder="지시를 입력하세요...">
            <button onclick="sendToPatient()">전송</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://gcs-test-eb738-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeCaseIdx = 0; // 예시 인덱스

    const aiResponses = {
        0: { 
            commandBase: "🖐️ [운동 지시 반응] 지시하신 '{REQ}'를 이해하고 힘을 주려 하지만, 의식 저하로 인해 명확하게 수행하지 못합니다.",
            pain: "💥 [통증 자극 반응] 아픈 부위를 향해 손을 뻗어 밀쳐냅니다.",
            default: "머리가 아파요..."
        }
    };

    function sendToPatient() {
        const input = document.getElementById("studentMsg");
        const text = input.value.trim();
        if(!text) return;
        
        // 1. 화면 표시
        const box = document.getElementById("chatBox");
        box.innerHTML += `<div class="msg student">${text}</div>`;
        input.value = "";

        // 2. 키워드 우선순위 검사 (가장 핵심!)
        const commK = ["손", "팔", "다리", "발", "움직", "펴", "구부", "들어", "올려"];
        const painK = ["통증", "자극", "꼬집", "압박", "아픈"];
        
        let reply = aiResponses[activeCaseIdx].default;

        // [핵심] 운동 명령(commK)이 들어갔는지 가장 먼저 확인
        if (commK.some(k => text.includes(k))) {
            reply = aiResponses[activeCaseIdx].commandBase.replace("{REQ}", text);
        } 
        else if (painK.some(k => text.includes(k))) {
            reply = aiResponses[activeCaseIdx].pain;
        }

        // 3. 환자 응답 표시
        setTimeout(() => {
            box.innerHTML += `<div class="msg patient">${reply}</div>`;
            box.scrollTop = box.scrollHeight;
        }, 500);
    }
</script>
</body>
</html>
