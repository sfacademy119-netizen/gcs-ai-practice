<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS AI 실습 (학습자용)</title>

    <style>
        /* Light Mode & Refined Design */
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 20px; 
            color: #1e293b; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-sizing: border-box; 
            padding-bottom: 60px; 
        }
        
        .card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 20px; 
            padding: 28px; 
            width: 100%; 
            max-width: 460px; 
            box-sizing: border-box; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            position: relative; 
            z-index: 10; 
        }
        
        h2 { 
            margin-top: 0; 
            font-size: 20px; 
            color: #0284c7; 
            text-align: center; 
            margin-bottom: 20px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .input-group { 
            margin-bottom: 18px; 
        }
        
        .input-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: #475569; 
            letter-spacing: -0.3px;
        }
        
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #cbd5e1; 
            background: #f8fafc; 
            color: #0f172a; 
            font-size: 15px; 
            box-sizing: border-box; 
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        
        .btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            background: #2563eb; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }
