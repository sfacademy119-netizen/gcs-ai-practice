<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCS AI 실습 (학습자용)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Light Mode & Refined Design */
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 20px; 
            color: #1e293b; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-sizing: border-box; 
            padding-bottom: 60px; 
        }
        
        .card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 20px; 
            padding: 28px; 
            width: 100%; 
            max-width: 460px; 
            box-sizing: border-box; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            position: relative; 
            z-index: 10; 
        }
        
        h2 { 
            margin-top: 0; 
            font-size: 20px; 
            color: #0284c7; 
            text-align: center; 
            margin-bottom: 20px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .input-group { 
            margin-bottom: 18px; 
        }
        
        .input-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: #475569; 
            letter-spacing: -0.3px;
        }
        
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #cbd5e1; 
            background: #f8fafc; 
            color: #0f172a; 
            font-size: 15px; 
            box-sizing: border-box; 
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        
        .btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            background: #2563eb; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }
        
        .patient-profile-card { 
            background: #f0f9ff; 
            border: 1px solid #bae6fd; 
            border-radius: 14px; 
            padding: 16px; 
            margin-bottom: 20px; 
            font-size: 13px; 
            line-height: 1.5; 
            color: #0369a1;
        }

        .patient-profile-card div {
            font-weight: 500;
        }

        .chat-box { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 16px; 
            height: 260px; 
            overflow-y: auto; 
            padding: 20px; 
            margin-bottom: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }
        
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 16px; 
            font-size: 14px; 
            line-height: 1.5; 
        }
        
        .msg.student { 
            background: #2563eb; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
            font-weight: 500;
        }
        
        .msg.patient { 
            background: #e2e8f0; 
            color: #0f172a; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
        }

        .chat-input-area { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .chat-input-area input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #cbd5e1; 
            background: #ffffff; 
            color: #0f172a; 
            font-size: 14px;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .btn-send { 
            background: #059669; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.2s;
        }

        .btn-send:hover {
            background: #047857;
        }
        
        .gcs-select-zone { 
            background: #f1f5f9; 
            border: 1px solid #cbd5e1; 
            padding: 16px; 
            border-radius: 16px; 
        }

        .gcs-select-zone select { 
            background: #ffffff; 
            color: #0f172a; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1; 
            font-weight: 500;
        }
        
        .waiting-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(241, 245, 249, 0.98); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
            text-align: center; 
        }

        .waiting-box { 
            background: #ffffff; 
            border: 1px solid #0284c7; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 360px; 
        }
        
        .feedback-box { 
            background: #a7f3d0; 
            color: #064e3b; 
            border-radius: 12px; 
            padding: 20px; 
            margin-top: 20px; 
            font-size: 14px; 
            line-height: 1.6; 
            font-weight: 500; 
            display: none; 
        }

        .creator-watermark { 
            position: fixed; 
            bottom: 15px; 
            right: 20px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 10px; 
            font-weight: bold; 
            color: #94a3b8; 
            letter-spacing: 3px; 
            z-index: 100000; 
            pointer-events: none; 
            opacity: 0.8; 
            text-align: right; 
        }

        .creator-watermark span { 
            color: #0284c7; 
            font-size: 12px; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>

<div class="card">
    <div id="loginSection">
        <h2>📱 의식 사정 AI 실습방 입장</h2>
        <div class="input-group"><label>학번</label><input type="text" id="studentId" placeholder="예: 20261234"></div>
        <div class="input-group"><label>성명</label><input type="text" id="studentName" placeholder="예: 홍길동"></div>
        <button class="btn" onclick="enterRoom()">실습방 입장하기</button>
    </div>

    <div id="quizSection" style="display: none;">
        <h2>🏥 응급실 가상 환자 의식 사정</h2>
        <div class="patient-profile-card">
            <div id="pName" style="font-weight:bold; color:#0284c7; margin-bottom:8px; font-size: 15px;">환자 로딩 중...</div>
            <div id="pMeta" style="color:#334155; margin-bottom:4px;">-</div>
            <div id="pCc" style="color:#0369a1; font-weight: bold;">-</div>
        </div>
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input-area">
            <input type="text" id="studentMsg" placeholder="환자에게 질문하거나 자극을 주세요..." onkeypress="if(event.keyCode==13) sendToPatient()">
            <button class="btn-send" onclick="sendToPatient()">전송</button>
        </div>
        <div class="gcs-select-zone">
            <div style="display: flex; gap: 8px; margin-bottom:12px;">
                <select id="resE" style="flex:1;"><option value="4">E4</option><option value="3">E3</option><option value="2">E2</option><option value="1">E1</option></select>
                <select id="resV" style="flex:1;"><option value="5">V5</option><option value="4">V4</option><option value="3">V3</option><option value="2">V2</option><option value="1">V1</option></select>
                <select id="resM" style="flex:1;"><option value="6">M6</option><option value="5">M5</option><option value="4">M4</option><option value="3">M3</option><option value="2">M2</option><option value="1">M1</option></select>
            </div>
            <button class="btn" id="submitBtn" onclick="submitFinalAnswer()" style="margin:0; background:#059669;">최종 판정 제출</button>
        </div>
        
        <div class="feedback-box" id="feedbackBox">
            <b style="font-size:15px; color:#065f46;">🎯 교수자 임상 피드백 및 해설</b><br><br>
            <span id="fbText"></span>
        </div>
    </div>
</div>

<div class="waiting-overlay" id="waitingOverlay">
    <div class="waiting-box">
        <h3 style="color:#0284c7; margin-top:0; font-size: 20px;">👥 가상 실습방 대기실</h3>
        <p style="color:#334155; font-size:14px; line-height:1.6; margin-bottom:0;">
            성공적으로 연결되었습니다.<br>
            <span style="color:#0369a1; font-weight:bold;">[교수님이 시나리오를 전송하면 실습이 시작됩니다]</span>
        </p>
    </div>
</div>

<div class="creator-watermark">CREATED BY<br><span>PROF. KYUNG-MI KIM</span></div>

            call: "(환자의 이름을 크게 외치고 흔들어 깨워보아도 눈을 뜨려는 기색을 전혀 보이지 않고 무반응입니다.)",

        },

            call: "(주변에 알코올취가 심하게 풍기며, 소리를 지르고 어깨를 흔들어 깨워보아도 전혀 눈을 뜨지 못합니다.)",

            default: "...", 
            desc: "임상 피드백:\n급성 알코올 중독 환자입니다. 음성 및 통증 자극 어디에도 개안 반응이 존재하지 않으며(E1), 완전한 무발성 상태(V1)입니다. 강한 자극을 가했을 때 사지를 웅크리며 자극원으로부터 몸을 멀리 피하려는 회피 굴곡 운동 반응(M4)이 관찰됩니다."

            desc: "임상 피드백:\n중증 대뇌 및 뇌간 손상 상태입니다. 개안이 불가능하고(E1), 언어 능력이 완전히 손실된 상태(V1)입니다. 유해 자극이 가해졌을 때 사지를 외전 시키며 뻣뻣하게 일자로 쭉 뻗는 이상 신전 반응(M2)을 나타냅니다."

    function enterRoom() {
        const id = document.getElementById("studentId").value.trim();
        const name = document.getElementById("studentName").value.trim();
        if(!id || !name) { alert("학번과 성명을 입력하세요."); return; }
        myKey = id;
        
        document.getElementById("waitingOverlay").style.display = "flex";
        isInitialized = false; 
        
        db.ref('students/' + id).set({ id: id, name: name, status: "ready" }).then(() => {
            db.ref('students/' + id).onDisconnect().remove();
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("quizSection").style.display = "block";
            listenServer();
        });
    }

    function listenServer() {
        db.ref('quizState').on('value', snap => {
            const state = snap.val();
            
            if(!state || isNaN(parseInt(state.currentCase)) || parseInt(state.currentCase) === -1) {
                activeCaseIdx = -1;
                isInitialized = true; 
                document.getElementById("waitingOverlay").style.display = "flex";
                document.getElementById("feedbackBox").style.display = "none";
                return;
            }

            const serverCase = parseInt(state.currentCase);

            if (!isInitialized) {
                isInitialized = true;
                activeCaseIdx = serverCase; 
                document.getElementById("waitingOverlay").style.display = "flex";
                return;
            }

            if(activeCaseIdx !== serverCase) {
                activeCaseIdx = serverCase;
                alertTriggered = false; 
                document.getElementById("waitingOverlay").style.display = "none"; 
                document.getElementById("feedbackBox").style.display = "none";
                loadCase(activeCaseIdx);
            }

            if(state.revealStatus === "show") {
                if(!alertTriggered && activeCaseIdx !== -1) {
                    alertTriggered = true;
                    alert("정답/해설이 공개되었습니다.");
                    document.getElementById("fbText").innerText = aiResponses[activeCaseIdx].desc;
                    document.getElementById("feedbackBox").style.display = "block";
                }
            } else {
                document.getElementById("feedbackBox").style.display = "none";
                alertTriggered = false;
            }
        });
    }

    function loadCase(idx) {
        if (idx === -1 || !aiResponses[idx]) return;
        
        const data = aiResponses[idx];
        document.getElementById("pName").innerText = data.name;
        document.getElementById("pMeta").innerText = data.meta;
        document.getElementById("pCc").innerText = "주소증: " + data.name + " 의식 수준 사정 진행";
        
        document.getElementById("chatBox").innerHTML = `<div class="msg patient">${data.init}</div>`;
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").style.background = "#059669";
        
        document.getElementById("resE").value = "4";
        document.getElementById("resV").value = "5";
        document.getElementById("resM").value = "6";
        chatLog = [];
    }

    function sendToPatient() {
        const text = document.getElementById("studentMsg").value.trim();
        if(!text) return;
        appendMsg(text, "student");
        document.getElementById("studentMsg").value = "";

        const data = aiResponses[activeCaseIdx];
        if(!data) return;
        
        let reply = data.default;
        
        const commK = ["손", "팔", "다리", "발", "쥐어", "잡아", "들어", "올려", "움직", "펴", "구부", "악수", "상지", "하지", "명령", "주먹", "가락"];
        const painK = ["통증", "자극", "꼬집", "누르", "압박", "흉골", "손톱", "아프", "아픈", "발톱"];
        const whereK = ["어디", "병원", "날짜", "오늘", "며칠", "이름", "성함", "연도", "장소", "시간", "누구", "기억", "여기가"];
        const callK = ["눈", "떠", "들리", "깨워", "환자분", "여보세요", "일어나", "제 말"];

        if (commK.some(k => text.includes(k))) {
            let targetBody = "신체";
            let targetAction = "움직이라는 지시";
            let side = "";

            if (text.includes("오른") || text.includes("우측")) side = "오른쪽 ";
            if (text.includes("왼") || text.includes("좌측")) side = "왼쪽 ";

            if (text.includes("손가락")) {
                targetBody = side + "손가락";
                targetAction = side + "손가락을 까딱여보라는 지시";
            } else if (text.includes("발가락")) {
                targetBody = side + "발가락";
                targetAction = side + "발가락을 움직여보라는 지시";
            } else if (text.includes("주먹") || text.includes("꽉") || text.includes("쥐어") || text.includes("잡아")) {
                targetBody = side + "손";
                targetAction = side + "손으로 주먹을 쥐거나 꽉 잡아보라는 지시";
            } else if (text.includes("손") || text.includes("악수")) {
                targetBody = side + "손";
                targetAction = side + "손을 움직이거나 악수하자는 지시";
            } else if (text.includes("팔") || text.includes("상지")) {
                targetBody = side + "팔";
                targetAction = side + "팔을 들어 올려보라는 지시";
            } else if (text.includes("다리") || text.includes("하지")) {
                targetBody = side + "다리";
                targetAction = side + "다리를 들어보라는 지시";
            } else if (text.includes("발")) {
                targetBody = side + "발";
                targetAction = side + "발목이나 발을 움직여보라는 지시";
            } else if (text.includes("들어") || text.includes("올려")) {
                targetAction = "몸을 들거나 움직여보라는 지시";
            }

            if (activeCaseIdx === 0) { 
                reply = `🖐️ [운동 지시 반응] 의료진이 ${targetAction}를 내리자, 환자는 찡그린 표정으로 신음을 내며 해당 [${targetBody}] 부위에 아주 미세하게 힘을 주며 움찔거리려고 할 뿐, 의식 저하가 심해 지시대로 움직임을 명확하게 완수하지는 못합니다.`;
            } 
            else if (activeCaseIdx === 1) { 
                reply = `🖐️ [운동 지시 반응] 환자의 어깨를 치며 ${targetAction}를 유도해보았으나, 환자는 깊은 혼수 상태로 어떠한 언어 명령도 인지하지 못하며, 요구된 [${targetBody}] 부위를 포함해 전신에 아무런 수의적 반응이 없습니다.`;
            } 
            else if (activeCaseIdx === 2) { 
                if (text.includes("오른") || text.includes("우측")) {
                    reply = `🖐️ [운동 지시 반응] 의료진이 ${targetAction}를 내리자, [오른쪽 뇌경색 마비 증상으로 인해 우측 ${targetBody.replace("오른쪽 ", "")}은 전혀 꼼짝도 하지 못합니다.] 그러나 환자는 지시를 이해했다는 듯이 마비가 없는 반대쪽(왼쪽) 신체를 대신 움찔거립니다.`;
                } else {
                    reply = `🖐️ [운동 지시 반응] 의료진이 ${targetAction}를 하자, 환자는 지시 사항을 정확하게 이해하고 [마비가 없는 정상 측인 ${targetBody || "왼쪽 신체"}를 명확하게 들어 올리거나 꽉 쥐며] 명령에 온전하게 복종합니다.`;
                }
            } 
            else if (activeCaseIdx === 3) { 
                reply = `🖐️ [운동 지시 반응] 환자의 이름을 부르며 ${targetAction}를 시도했으나, 깊은 혼미 상태로 전신 근육이 이완되어 축 늘어져 있으며 [${targetBody}]에 어떠한 자발적인 수축이나 움직임도 관찰되지 않습니다.`;
            } 
            else if (activeCaseIdx === 4) { 
                reply = `🖐️ [운동 지시 반응] 대답 없이 감은 눈을 유지하는 환자에게 ${targetAction}라는 지시를 반복했으나, [${targetBody}]를 포함한 사지 전신이 나무토막처럼 뻣뻣하게 경직되어 있을 뿐 어떠한 반응도 개시하지 못합니다.`;
            }
        } 
        else if (painK.some(k => text.includes(k))) {
            let painSite = "중심성 및 말초성 통증 자극";
            if (text.includes("손톱") || text.includes("손가락")) painSite = "손톱 끝 압박 자극";
            if (text.includes("발톱") || text.includes("발가락")) painSite = "발톱 밑 강한 압박 자극";
            if (text.includes("흉골") || text.includes("가슴") || text.includes("명치")) painSite = "흉골 압박 자극";
            if (text.includes("꼬집") || text.includes("옆구리")) painSite = "피부 꼬집기 자극";

            reply = data.pain.replace("중심성 통증 자극(흉골 압박 등)", painSite)
                             .replace("흉골에 강력한 압박 자극을", `${painSite}을`)
                             .replace("통증 유해 자극을 주면", `${painSite}을 주면`)
                             .replace("흉골과 손톱 끝을 매우 강하게 압박했으나", `${painSite}을 매우 강하게 가했으나`)
                             .replace("손톱 끝을 하얗게 변할 정도로 강하게 압박해보아도", `${painSite}을 강하게 가해보아도`);
        } 
        else if (whereK.some(k => text.includes(k))) {
            reply = data.where;
        } 
        else if (callK.some(k => text.includes(k))) {
            reply = data.call;
        }

        setTimeout(() => appendMsg(reply, "patient"), 400);
    }

    function appendMsg(text, sender) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = "msg " + sender;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        chatLog.push((sender === "student" ? "[학생]: " : "[환자]: ") + text);
        
        if(myKey) {
            db.ref('students/' + myKey).update({ logs: chatLog.join("\n") });
        }
    }

    function submitFinalAnswer() {
        const e = document.getElementById("resE").value;
        const v = document.getElementById("resV").value;
        const m = document.getElementById("resM").value;
        if(myKey) {
            db.ref('students/' + myKey).update({ answer: `E${e}V${v}M${m}`, status: "submitted" });
            alert("교수님께 제출 완료되었습니다.");
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("submitBtn").style.background = "#94a3b8";
        }
    }
</script>
</body>
</html>
